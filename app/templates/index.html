<!DOCTYPE html>
<html>
<head>
    <title>Media Processing Service</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h1 {
            margin-top: 0;
            font-size: 22px;
            font-weight: 600;
        }

        label {
            display: block;
            margin-top: 20px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
        }

        button {
            margin-top: 30px;
            padding: 12px;
            width: 100%;
            border: none;
            background: #2d6cdf;
            color: white;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #1f4fbf;
        }

        .section {
            margin-top: 25px;
        }

        .hidden {
            display: none;
        }

        .divider {
            margin: 30px 0;
            border-top: 1px solid #eee;
        }
    </style>

    <script>
        function updateOperationUI() {
            const action = document.getElementById("action").value;

            document.getElementById("repeatSection").classList.add("hidden");
            document.getElementById("trimSection").classList.add("hidden");

            if (action === "repeat") {
                document.getElementById("repeatSection").classList.remove("hidden");
            }

            if (action === "trim") {
                document.getElementById("trimSection").classList.remove("hidden");
            }
        }

        window.onload = updateOperationUI;
    </script>
</head>
<body>

<div class="container">
    <h1>Media Processing Service</h1>

    <form action="/process" method="post" enctype="multipart/form-data">

        <label>Upload Video</label>
        <input type="file" name="video" required>

        <div class="divider"></div>

        <label>Select Operation</label>
        <select name="action" id="action" onchange="updateOperationUI()">
            <option value="repeat">Repeat</option>
            <option value="mp3">Convert to MP3</option>
            <option value="trim">Trim</option>
            <option value="inspect">Inspect Metadata</option>
        </select>

        <!-- Repeat Section -->
        <div id="repeatSection" class="section hidden">
            <label>Repeat Count</label>
            <input type="number" name="repeat" min="1" placeholder="e.g. 3">
        </div>

        <!-- Trim Section -->
        <div id="trimSection" class="section hidden">
            <label>Start Time (HH:MM:SS)</label>
            <input type="text" name="start" placeholder="00:00:05">

            <label>Duration (seconds)</label>
            <input type="text" name="duration" placeholder="5">
        </div>

        <button type="submit">Process</button>
    </form>
</div>

</body>
</html>
